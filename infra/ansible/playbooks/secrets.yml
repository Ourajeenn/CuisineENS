---
# ══════════════════════════════════════════════════════════════════════════════
# Playbook : secrets.yml
# Injecte les secrets dans les apps Fly.io via flyctl secrets set
# Usage : ansible-playbook playbooks/secrets.yml \
#           -e "fly_api_token=xxx secret_key=xxx"
# ══════════════════════════════════════════════════════════════════════════════
- name: "🔐 CuisineEnsemble — Injecter les secrets Fly.io"
  hosts: flyio
  gather_facts: false

  tasks:
    - name: "Injecter les secrets dans le backend"
      command: >
        flyctl secrets set
        SECRET_KEY="{{ secret_key }}"
        ENVIRONMENT="production"
        ALLOWED_ORIGINS="{{ allowed_origins | default('https://cuisine-ensemble-web.fly.dev') }}"
        --app "{{ fly_backend_app }}"
      no_log: true
      environment:
        FLY_API_TOKEN: "{{ fly_api_token }}"

    - name: "✅ Secrets backend injectés"
      debug:
        msg: "Les secrets de '{{ fly_backend_app }}' ont été configurés avec succès"

    - name: "Lister les secrets existants (noms uniquement)"
      command: flyctl secrets list --app "{{ fly_backend_app }}"
      register: secrets_list
      changed_when: false
      environment:
        FLY_API_TOKEN: "{{ fly_api_token }}"

    - name: "Afficher la liste des secrets"
      debug:
        msg: "{{ secrets_list.stdout_lines }}"
