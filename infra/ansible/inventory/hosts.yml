---
# ══════════════════════════════════════════════════════════════════════════════
# Inventaire Ansible — CuisineEnsemble
# Fly.io est géré via flyctl en local → on cible localhost
# ══════════════════════════════════════════════════════════════════════════════
all:
  children:
    # Groupe principal : commandes flyctl exécutées en local
    flyio:
      hosts:
        localhost:
          ansible_connection: local
          ansible_python_interpreter: "{{ ansible_playbook_python }}"
