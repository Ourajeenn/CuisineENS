stages:
  - lint
  - test
  - build
  - deploy

variables:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"
  FLY_API_TOKEN: "$FLY_API_TOKEN" # Géré via les variables secrètes GitLab CI
  SECRET_KEY: "$SECRET_KEY"       # Géré via les variables secrètes GitLab CI

# Configuration du cache pour accélérer les builds
cache:
  key: "$CI_COMMIT_REF_SLUG"
  paths:
    - .cache/pip
    - frontend/node_modules/

# ──────────────────────────────────────────────────────────────────────────────
# 1. Étape de Linting & Formating
# ──────────────────────────────────────────────────────────────────────────────
lint-backend:
  stage: lint
  image: python:3.12-slim
  script:
    - pip install flake8 black isort
    - flake8 backend/app/ --count --select=E9,F63,F7,F82 --show-source --statistics
    - black --check --diff backend/app/

lint-frontend:
  stage: lint
  image: node:20-slim
  script:
    - cd frontend
    - npm ci
    - npm run lint --if-present

# ──────────────────────────────────────────────────────────────────────────────
# 2. Étape de Tests
# ──────────────────────────────────────────────────────────────────────────────
test-backend:
  stage: test
  image: python:3.12-slim
  script:
    - cd backend
    - pip install -r requirements.txt
    - python -m pytest --cov=app --cov-report=xml --cov-report=term-missing tests/
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: backend/coverage.xml
    paths:
      - backend/coverage.xml
    expire_in: 7 days

# ──────────────────────────────────────────────────────────────────────────────
# 3. Étape de Build (React App & Docker Images)
# ──────────────────────────────────────────────────────────────────────────────
build-frontend:
  stage: build
  image: node:20-slim
  script:
    - cd frontend
    - npm ci
    - npm run build
  artifacts:
    paths:
      - frontend/dist/
    expire_in: 7 days

build-docker:
  stage: build
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build -t $CI_REGISTRY_IMAGE/backend:latest -t $CI_REGISTRY_IMAGE/backend:$CI_COMMIT_SHA ./backend
    - docker build -t $CI_REGISTRY_IMAGE/frontend:latest -t $CI_REGISTRY_IMAGE/frontend:$CI_COMMIT_SHA ./frontend
    - docker push $CI_REGISTRY_IMAGE/backend:latest
    - docker push $CI_REGISTRY_IMAGE/backend:$CI_COMMIT_SHA
    - docker push $CI_REGISTRY_IMAGE/frontend:latest
    - docker push $CI_REGISTRY_IMAGE/frontend:$CI_COMMIT_SHA
  only:
    - master

# ──────────────────────────────────────────────────────────────────────────────
# 4. Étape de Déploiement (Fly.io)
# ──────────────────────────────────────────────────────────────────────────────
deploy-flyio:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache curl python3 py3-pip terraform ansible git openssh-client
    # Installation de flyctl
    - curl -L https://fly.io/install.sh | sh
    - export PATH="/root/.fly/bin:$PATH"
  script:
    - export PATH="/root/.fly/bin:$PATH"
    # Injection des variables d'environnement pour Terraform
    - export TF_VAR_fly_api_token="$FLY_API_TOKEN"
    - export TF_VAR_secret_key="$SECRET_KEY"
    - export TF_VAR_backend_image="$CI_REGISTRY_IMAGE/backend:latest"
    - export TF_VAR_frontend_image="$CI_REGISTRY_IMAGE/frontend:latest"
    
    # Terraform Apply
    - cd infra/terraform
    - terraform init
    - terraform apply -auto-approve
    
    # Post-déploiement Ansible (migrations & health check)
    - cd ../ansible
    - ansible-playbook playbooks/migrate.yml -e "fly_api_token=$FLY_API_TOKEN"
    - ansible-playbook playbooks/healthcheck.yml -e "fly_api_token=$FLY_API_TOKEN"
  after_script:
    # Lancement du Rollback si le job échoue
    - |
      if [ $CI_JOB_STATUS == "failed" ]; then
        echo "⚠️ Échec détecté : Lancement du rollback automatique..."
        apk add --no-cache curl python3 py3-pip ansible
        curl -L https://fly.io/install.sh | sh
        export PATH="/root/.fly/bin:$PATH"
        cd infra/ansible
        ansible-playbook playbooks/rollback.yml -e "fly_api_token=$FLY_API_TOKEN"
      fi
  only:
    - master
