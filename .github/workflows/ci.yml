name: CuisineEnsemble CI/CD Pipeline

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

env:
  PYTHON_VERSION: '3.12'
  NODE_VERSION: '20'

jobs:
  # ─────────────────────────────────────────────────
  # 1. Static Code Analysis (Linting & Style Checks)
  # ─────────────────────────────────────────────────
  lint:
    name: 🔍 Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install Python Linters
        run: pip install flake8 black isort

      - name: Run Flake8 (Critical Errors Only)
        run: |
          flake8 backend/app/ --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Check Black Formatting
        run: |
          black --check --diff backend/app/

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm ci

      - name: Run ESLint
        run: |
          cd frontend
          npm run lint --if-present

  # ─────────────────────────────────────────────────
  # 2. Security SAST with Semgrep
  # ─────────────────────────────────────────────────
  security-scan:
    name: 🛡️ Security Scan (SAST)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Semgrep SAST
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/python
            p/javascript
            p/jwt
            p/owasp-top-ten
          generateSarif: "1"
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

      - name: Upload SARIF to GitHub Security Tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep.sarif
        continue-on-error: true

  # ─────────────────────────────────────────────────
  # 3. Backend Tests & Coverage
  # ─────────────────────────────────────────────────
  test-backend:
    name: 🧪 Backend Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install Dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Run Pytest with Coverage
        run: |
          cd backend
          python -m pytest \
            --cov=app \
            --cov-report=xml \
            --cov-report=term-missing \
            --tb=short \
            -v \
            tests/

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: backend/coverage.xml
          retention-days: 7

      - name: Coverage Summary
        run: |
          cd backend
          python -m pytest --cov=app --cov-report=term-missing tests/ 2>/dev/null | tail -5 || true

  # ─────────────────────────────────────────────────
  # 4. Frontend Build Validation
  # ─────────────────────────────────────────────────
  build-frontend:
    name: 🏗️ Frontend Build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: |
          cd frontend
          npm ci

      - name: Build Production Bundle
        run: |
          cd frontend
          npm run build

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

  # ─────────────────────────────────────────────────
  # 5. Docker Image Build
  # ─────────────────────────────────────────────────
  docker-build:
    name: 🐳 Docker Build
    runs-on: ubuntu-latest
    needs: [test-backend, security-scan, build-frontend]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Backend Image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          tags: cuisine-ensemble-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Frontend Image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false
          tags: cuisine-ensemble-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────────
  # 6. Simulate Kubernetes Staging Deployment
  # ─────────────────────────────────────────────────
  deploy-staging:
    name: 🚀 Deploy to Staging
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main'
    environment:
      name: staging
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Simulate K8s Deployment
        run: |
          echo "🚀 Deploying CuisineEnsemble to Kubernetes staging..."
          echo ""
          echo "kubectl apply -f k8s/postgres.yml"
          echo "kubectl apply -f k8s/backend.yml"
          echo "kubectl apply -f k8s/frontend.yml"
          echo ""
          echo "✅ Backend deployment: cuisine-ensemble-backend:${{ github.sha }}"
          echo "✅ Frontend deployment: cuisine-ensemble-frontend:${{ github.sha }}"
          echo ""
          echo "🌐 Staging URL: https://staging.cuisineensemble.fr"
          echo "📊 Monitoring:  https://grafana.cuisineensemble.fr"

      - name: Post Deployment Summary
        run: |
          echo "## 🚀 Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Component | Version |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Backend | \`cuisine-ensemble-backend:${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend | \`cuisine-ensemble-frontend:${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered by | @${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
