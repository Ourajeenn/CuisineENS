name: CuisineEnsemble CI/CD Pipeline

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

env:
  PYTHON_VERSION: '3.12'
  NODE_VERSION: '20'

jobs:
  # ─────────────────────────────────────────────────
  # 1. Static Code Analysis (Linting & Style Checks)
  # ─────────────────────────────────────────────────
  lint:
    name: 🔍 Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install Python Linters
        run: pip install flake8 black isort

      - name: Run Flake8 (Critical Errors Only)
        run: |
          flake8 backend/app/ --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Check Black Formatting
        run: |
          black --check --diff backend/app/

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm ci

      - name: Run ESLint
        run: |
          cd frontend
          npm run lint --if-present

  # ─────────────────────────────────────────────────
  # 2. Security SAST with Semgrep
  # ─────────────────────────────────────────────────
  security-scan:
    name: 🛡️ Security Scan (SAST)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Semgrep SAST
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/python
            p/javascript
            p/jwt
            p/owasp-top-ten
          generateSarif: "1"
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

      - name: Upload SARIF to GitHub Security Tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep.sarif
        continue-on-error: true

  # ─────────────────────────────────────────────────
  # 3. Backend Tests & Coverage
  # ─────────────────────────────────────────────────
  test-backend:
    name: 🧪 Backend Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install Dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Run Pytest with Coverage
        run: |
          cd backend
          python -m pytest \
            --cov=app \
            --cov-report=xml \
            --cov-report=term-missing \
            --tb=short \
            -v \
            tests/

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: backend/coverage.xml
          retention-days: 7

      - name: Coverage Summary
        run: |
          cd backend
          python -m pytest --cov=app --cov-report=term-missing tests/ 2>/dev/null | tail -5 || true

  # ─────────────────────────────────────────────────
  # 4. Frontend Build Validation
  # ─────────────────────────────────────────────────
  build-frontend:
    name: 🏗️ Frontend Build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: |
          cd frontend
          npm ci

      - name: Build Production Bundle
        run: |
          cd frontend
          npm run build

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

  # ─────────────────────────────────────────────────
  # 5. Docker Image Build & Push to GHCR
  # ─────────────────────────────────────────────────
  docker-build:
    name: 🐳 Docker Build & Push
    runs-on: ubuntu-latest
    needs: [test-backend, security-scan, build-frontend]
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set lower case owner name
        run: |
          echo "OWNER_LC=${OWNER,,}" >> ${GITHUB_ENV}
        env:
          OWNER: '${{ github.repository_owner }}'

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Backend Image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/cuisine-ensemble-backend:latest
            ghcr.io/${{ env.OWNER_LC }}/cuisine-ensemble-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/cuisine-ensemble-frontend:latest
            ghcr.io/${{ env.OWNER_LC }}/cuisine-ensemble-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────────
  # 6. Deploy to Fly.io (Terraform + Ansible)
  # ─────────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to Fly.io
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main'
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set lower case owner name
        run: |
          echo "OWNER_LC=${OWNER,,}" >> ${GITHUB_ENV}
        env:
          OWNER: '${{ github.repository_owner }}'

      - name: Set up flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.0

      - name: Set up Python for Ansible
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Ansible
        run: |
          python -m pip install --upgrade pip
          pip install ansible

      - name: Terraform Init
        run: |
          cd infra/terraform
          terraform init

      - name: Terraform Apply
        run: |
          cd infra/terraform
          terraform apply -auto-approve \
            -var="fly_api_token=${{ secrets.FLY_API_TOKEN }}" \
            -var="secret_key=${{ secrets.SECRET_KEY }}" \
            -var="backend_image=ghcr.io/${{ env.OWNER_LC }}/cuisine-ensemble-backend:latest" \
            -var="frontend_image=ghcr.io/${{ env.OWNER_LC }}/cuisine-ensemble-frontend:latest"

      - name: Run Ansible Post-Deploy (Migrations & Health Checks)
        run: |
          cd infra/ansible
          ansible-playbook playbooks/migrate.yml -e "fly_api_token=${{ secrets.FLY_API_TOKEN }}"
          ansible-playbook playbooks/healthcheck.yml -e "fly_api_token=${{ secrets.FLY_API_TOKEN }}"

      - name: Rollback on Failure
        if: failure()
        run: |
          cd infra/ansible
          ansible-playbook playbooks/rollback.yml -e "fly_api_token=${{ secrets.FLY_API_TOKEN }}"

      - name: Post Deployment Summary
        run: |
          echo "## 🚀 CuisineEnsemble Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Component | Status | Info |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Infrastructure | ✅ Terraform Apply Successful | Fly.io Apps & DB config |" >> $GITHUB_STEP_SUMMARY
          echo "| Backend API | ✅ Active | [Swagger Docs](https://cuisine-ensemble-api.fly.dev/docs) |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend UI | ✅ Active | [CuisineEnsemble Web](https://cuisine-ensemble-web.fly.dev) |" >> $GITHUB_STEP_SUMMARY
          echo "| Version | \`${{ github.sha }}\` | Triggered by @${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY

