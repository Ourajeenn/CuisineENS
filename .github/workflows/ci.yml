name: CuisineEnsemble CI/CD Pipeline

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"
  BACKEND_APP: cuisine-ensemble-api
  FRONTEND_APP: cuisine-ensemble-web

# ─────────────────────────────────────────────────────────────
# 1. LINT & FORMAT CHECK
# ─────────────────────────────────────────────────────────────
jobs:
  lint:
    name: 🔍 Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install Python Linters
        run: pip install flake8 black

      - name: Run Flake8 (Critical Errors Only)
        run: |
          flake8 backend/app/ --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Check Black Formatting
        run: |
          black --check --diff backend/app/
        continue-on-error: true   # non-blocking formatting check

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm ci

      - name: Run ESLint
        run: |
          cd frontend
          npm run lint --if-present
        continue-on-error: true   # non-blocking

# ─────────────────────────────────────────────────────────────
# 2. SECURITY SCAN (SAST)
# ─────────────────────────────────────────────────────────────
  security-scan:
    name: 🛡️ Security Scan (SAST)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Semgrep SAST
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/python
            p/javascript
            p/jwt
            p/owasp-top-ten
          generateSarif: "1"
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
        continue-on-error: true

      - name: Upload SARIF to GitHub Security Tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep.sarif
        continue-on-error: true

# ─────────────────────────────────────────────────────────────
# 3. BACKEND TESTS & COVERAGE
# ─────────────────────────────────────────────────────────────
  test-backend:
    name: 🧪 Backend Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install Dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Run Pytest with Coverage
        run: |
          cd backend
          python -m pytest \
            --cov=app \
            --cov-report=xml \
            --cov-report=term-missing \
            --tb=short \
            -v \
            tests/

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: backend/coverage.xml
          retention-days: 7

# ─────────────────────────────────────────────────────────────
# 4. FRONTEND BUILD VALIDATION
# ─────────────────────────────────────────────────────────────
  build-frontend:
    name: 🏗️ Frontend Build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: |
          cd frontend
          npm ci

      - name: Build Production Bundle
        run: |
          cd frontend
          VITE_API_URL=https://cuisine-ensemble-api.fly.dev/api/v1 npm run build

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

  e2e-tests:
    name: 🧪 End‑to‑End Tests
    runs-on: ubuntu-latest
    needs: [build-frontend, test-backend]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Playwright
        run: |
          cd frontend
          npm ci
          npx playwright install --with-deps

      - name: Run Playwright E2E Tests
        run: |
          cd frontend
          npx playwright test

      - name: Upload Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-report
          path: frontend/playwright-report/
          retention-days: 7

# ─────────────────────────────────────────────────────────────
# 5. DOCKER BUILD & PUSH TO GHCR
# ─────────────────────────────────────────────────────────────
  docker-build:
    name: 🐳 Docker Build & Push
    runs-on: ubuntu-latest
    needs: [test-backend, security-scan, build-frontend]
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set lower case owner name
        run: |
          echo "OWNER_LC=${OWNER,,}" >> ${GITHUB_ENV}
        env:
          OWNER: "${{ github.repository_owner }}"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Backend Image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/cuisine-ensemble-backend:latest
            ghcr.io/${{ env.OWNER_LC }}/cuisine-ensemble-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          build-args: |
            VITE_API_URL=https://cuisine-ensemble-api.fly.dev/api/v1
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/cuisine-ensemble-frontend:latest
            ghcr.io/${{ env.OWNER_LC }}/cuisine-ensemble-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

# ─────────────────────────────────────────────────────────────
# 6. DEPLOY TO FLY.IO (via fly deploy — pas Terraform)
# ─────────────────────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to Fly.io
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main'
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      # ── Backend deployment ──────────────────────────────────
      - name: Deploy Backend to Fly.io
        run: |
          flyctl deploy \
            --config fly.backend.toml \
            --dockerfile backend/Dockerfile \
            --remote-only \
            --strategy rolling
        working-directory: .

      # Wait for backend to be healthy before deploying frontend
      - name: Wait for Backend Health
        run: |
          echo "Waiting 30s for backend to stabilize..."
          sleep 30
          curl -f https://cuisine-ensemble-api.fly.dev/health || \
            (echo "❌ Backend health check failed!" && exit 1)

      # ── Frontend deployment ─────────────────────────────────
      - name: Deploy Frontend to Fly.io
        run: |
          flyctl deploy \
            --config fly.frontend.toml \
            --dockerfile frontend/Dockerfile \
            --build-arg VITE_API_URL=https://cuisine-ensemble-api.fly.dev/api/v1 \
            --remote-only \
            --strategy rolling
        working-directory: .

      # ── Post-deploy summary ─────────────────────────────────
      - name: Post Deployment Summary
        if: always()
        run: |
          echo "## 🚀 CuisineEnsemble — Résumé du déploiement" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Composant      | Statut | URL |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Backend API    | ✅ Déployé | [Swagger](https://cuisine-ensemble-api.fly.dev/docs) |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend UI    | ✅ Déployé | [CuisineEnsemble](https://cuisine-ensemble-web.fly.dev) |" >> $GITHUB_STEP_SUMMARY
          echo "| Version        | \`${{ github.sha }}\` | Par @${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY

      # ── Rollback automatique si échec ──────────────────────
      - name: Rollback Backend on Failure
        if: failure()
        run: |
          echo "⚠️ Rollback du backend..."
          flyctl releases list --config fly.backend.toml | head -5
          flyctl deploy --config fly.backend.toml --image $(flyctl releases list --config fly.backend.toml --json | jq -r '.[1].ImageRef') || true
